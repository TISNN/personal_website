" viewBox="0 0 96 96" fill="none" aria-hidden="true" class="ws-mark-logo"><path d="M22 18 V56" stroke="currentColor" stroke-width="8" stroke-linecap="round"></path><path d="M66 18 V56" stroke="currentColor" stroke-width="8" stroke-linecap="round"></path><path d="M60 28 L76 40" stroke="currentColor" stroke-width="8" stroke-linecap="round"></path><path d="M22 70 Q44 92 66 70" stroke="currentColor" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"></path></svg></a><nav class="ws-nav" aria-label="Primary navigation"><a class="" href="/">首页</a><span>/</span><a class="" href="/projects">项目</a><span>/</span><a class="is-active" href="/thoughts">最近思考</a></nav><div class="ws-top-actions"><button type="button" class="ws-top-link">EN</button><span>/</span><button type="button" class="ws-top-link">中</button><span>/</span><button type="button" class="ws-top-link">暗色</button></div></header><section class="ws-list-page"><div class="ws-explore-head ws-thoughts-head"><h2>最近思考</h2><div class="ws-thought-head-actions"><button type="button" class="ws-top-link">编辑</button></div></div><article class="ws-thought-row"><time>2026.02.22</time><h3>关于 Agent 工作流</h3><p>最近在思考：好的 Agent 系统不是“更复杂”，而是“更可验证”。把任务拆成更小的步骤，并让每一步可观测、可回滚，往往比追求一次性全自动更实用。</p></article><article class="ws-thought-row"><time>2026.02.16</time><h3>关于学习速度</h3><p>学习的核心不是输入多少信息，而是能否快速形成自己的判断框架。先做最小实践，再读理论，反馈通常更快。</p></article><article class="ws-thought-row"><time>2026.02.10</time><h3>关于产品细节</h3><p>用户感知到的“专业”，很多时候来自细节的一致性：命名一致、交互一致、错误提示一致。细节不只是美观，也是信任。</p></article><p class="ws-thought-note">提示：编辑内容会自动保存在当前浏览器（仅本地可见）。</p></section></div></main><script src="/_next/static/chunks/webpack-1796d5ecd61cbd74.js" async=""></script><script>(self.__next_f=self.__next_f||[]).push([0]);self.__next_f.push([2,null])</script><script>self.__next_f.push([1,"1:HL[\"/_next/static/css/45e52f7641b8e414.css\",\"style\"]\n"])</script><script>self.__next_f.push([1,"2:I[5751,[],\"\"]\n4:I[6513,[],\"ClientPageRoot\"]\n5:I[9928,[\"138\",\"static/
